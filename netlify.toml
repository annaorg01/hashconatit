[build]
  publish = "public"
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routes → serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Admin routes → serverless function (auth check)
[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
